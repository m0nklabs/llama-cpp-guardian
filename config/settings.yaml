services_to_stop:
- caramba-backend
- agent-forge
benchmark:
  schedule:
    start_hour: 4
    end_hour: 11
    days:
    - mon
    - tue
    - wed
    - thu
    - fri
proxy:
  port: 11434
  target: http://localhost:11440
  vram_limit_mb: 27000
queue:
  max_concurrent: 1
  queue_timeout_seconds: 300
services:
  comfyui_url: http://127.0.0.1:8188
timeouts:
  tiers:
    tier_70b:
      min_size_mb: 40000
      timeout_seconds: 1800
    tier_32b:
      min_size_mb: 20000
      timeout_seconds: 1200
    tier_13b:
      min_size_mb: 10000
      timeout_seconds: 600
    tier_8b:
      min_size_mb: 5000
      timeout_seconds: 360
    tier_small:
      min_size_mb: 0
      timeout_seconds: 600
  default_timeout: 600
scaler:
  enabled: true
  log_decisions: true
  profiles:
    trivial:
      max_chars: 200
      max_messages: 2
      thinking_budget: 256
      max_tokens: 1024
    simple:
      max_chars: 800
      max_messages: 4
      thinking_budget: 1024
      max_tokens: 4096
    moderate:
      max_chars: 4000
      max_messages: 12
      thinking_budget: 4096
      max_tokens: 8192
    complex:
      max_chars: 15000
      max_messages: 30
      thinking_budget: 8192
      max_tokens: 16384
    deep:
      thinking_budget: -1
      max_tokens: 32768
  queue_pressure:
    moderate_threshold: 2
    heavy_threshold: 4
    moderate_thinking_factor: 0.5
    heavy_thinking_factor: 0.25
    moderate_max_tokens_factor: 0.75
    heavy_max_tokens_factor: 0.5
